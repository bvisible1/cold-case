<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Profile</title>
<style>
  :root{
    --li:#4aa3ec; --li-deep:#0a66c2;
    --bg:#0c1620; --bg-1:#10202d; --bg-2:#16293a; --line:#23394d;
    --txt:#e7eef5; --txt-2:#9fb2c4; --dim:#6f8499; --green:#3aa76d;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --sans:'IBM Plex Sans',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;line-height:1.5;}
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 18px;background:linear-gradient(180deg,#0c3a6b,#0a2c4f);border-bottom:1px solid var(--line);}
  .in{width:24px;height:24px;border-radius:5px;background:#fff;color:var(--li-deep);font-weight:800;font-size:14px;display:grid;place-items:center;}
  .topbar .brand{font-weight:700;}
  .topbar .tab{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#9cc8f0;}
  .cover{height:88px;background:linear-gradient(120deg,#0a66c2,#15324d 55%,#0a2230);}
  .head{padding:0 22px 16px;border-bottom:1px solid var(--line);background:var(--bg-1);}
  .pfp{width:104px;height:104px;border-radius:50%;border:4px solid var(--bg-1);margin-top:-52px;background:#26405a;overflow:hidden;}
  .pfp img{width:100%;height:100%;object-fit:cover;filter:grayscale(.1);}
  .nm{font-size:24px;font-weight:700;margin-top:8px;}
  .hl{color:var(--txt-2);font-size:14px;}
  .meta{color:var(--dim);font-size:12px;margin-top:4px;}
  .meta b{color:var(--li);font-weight:600;}
  .openrow{display:flex;gap:8px;margin-top:12px;}
  .btn{font-family:var(--sans);font-size:13px;font-weight:600;padding:6px 16px;border-radius:18px;border:1px solid var(--li);color:#06121c;background:var(--li);cursor:default;}
  .btn.ghost{background:transparent;color:var(--li);}
  .wrap{padding:18px 22px;display:grid;gap:16px;}
  .card{background:var(--bg-1);border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
  .card h2{margin:0 0 10px;font-size:12px;font-family:var(--mono);letter-spacing:.15em;text-transform:uppercase;color:var(--li);}
  .about{font-size:13.5px;line-height:1.65;color:var(--txt);}
  .exp{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
  .exp:last-child{border-bottom:0;}
  .exp .ico{width:38px;height:38px;border-radius:8px;background:var(--bg-3,#1a2c3d);border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:11px;color:var(--li);flex:0 0 auto;}
  .exp .role{font-weight:600;font-size:14px;}
  .exp .co{color:var(--txt-2);font-size:12px;}
  .exp .dur{color:var(--dim);font-size:11px;font-family:var(--mono);}
  .post{padding:12px 0;border-bottom:1px solid var(--line);}
  .post:last-child{border-bottom:0;}
  .post .when{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;margin-bottom:5px;}
  .post .body{font-size:13.5px;line-height:1.6;}
  .post .react{margin-top:7px;font-family:var(--mono);font-size:10px;color:var(--dim);}
  .post .react b{color:var(--li);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{font-size:12px;padding:5px 11px;border-radius:14px;border:1px solid var(--line);color:var(--txt-2);background:var(--bg-2);}
  .det{display:flex;gap:10px;padding:8px 0;font-size:13px;align-items:baseline;border-bottom:1px solid var(--line);}
  .det:last-child{border-bottom:0;}
  .det .k{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--li);min-width:104px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
  const PROFILES = {
    rachel: {
      name: "Rachel Morgan", initials:"RM", face:"face-rachel.png",
      headline: "VP, Infrastructure & Platform Engineering at Meridian Capital Group",
      meta: "Charlotte, NC &middot; 500+ connections &middot; <b>2 mutual</b>",
      about: "Accountable for the platform and operational resilience behind Meridian's banking estate. Since the March outage, the question I keep getting from leadership &mdash; and now the OCC &mdash; is simple: when a deploy goes wrong, how fast do we know, before customers do? Resilience isn't a project anymore, it's the mandate. Previously led infrastructure at a top-10 US bank.",
      experience: [
        { ico:"MCG", role:"VP, Infrastructure & Platform Engineering", co:"Meridian Capital Group", dur:"4 yrs" },
        { ico:"PRV", role:"VP, Infrastructure", co:"(prior top-10 US bank)", dur:"6 yrs" },
      ],
      posts: [
        { when:"POSTED &middot; 1 WEEK AGO", body:"&ldquo;Operational resilience is a board-level conversation now. After March, &lsquo;the dashboard didn&rsquo;t catch it&rsquo; stopped being an acceptable answer. We&rsquo;re investing so a bad deploy surfaces in our tooling before a single customer feels it &mdash; and yes, the urgency came from the boardroom, not from IT.&rdquo;", react:"<b>1,940</b> reactions &middot; <b>150</b> comments" },
        { when:"RESHARED &middot; 2 WEEKS AGO", body:"Resharing our new CTO Brian Sorrell&rsquo;s first post: &lsquo;Detection is a design choice, not a postmortem.&rsquo; Exactly the lens we&rsquo;re applying across the platform this year.", react:"<b>520</b> reactions" },
        { when:"SPOKE AT &middot; REGIONAL BANK TECH FORUM 2026", body:"Grateful to talk about running observability across two core-banking systems mid-integration &mdash; the constraint nobody outside banking appreciates: you can&rsquo;t take the core down, so detection has to be consistent across FIS, Fiserv, and the new cloud.", react:"<b>360</b> reactions" },
      ],
      details: [
        { k:"Volunteers", v:"Mentor, Women in Tech &mdash; Charlotte chapter (great rapport angle, not a sales angle)." },
        { k:"Posted req", v:"Her org is hiring an Observability Engineer and SREs &mdash; she's building the function, not outsourcing it." },
        { k:"Reads as", v:"Speaks in board and regulatory outcomes, not features. Lead with the exam exposure and what a repeat outage costs." },
      ],
      chips: ["Operational resilience","Observability","MTTR / detection","Category III readiness","Platform consolidation"],
    },
    daniel: {
      name: "Daniel Hughes", initials:"DH", face:"face-daniel.png",
      headline: "Director, Site Reliability Engineering at Meridian Capital Group",
      meta: "Charlotte, NC &middot; 500+ connections &middot; <b>2 mutual</b>",
      about: "I run the team that keeps Meridian's banking platforms reliable 24/7 across 420+ branches. Came up through platform engineering. I care about day-2 reality, not vision slides &mdash; what breaks at 2am and how fast we catch it. Right now that means wrangling two core-banking systems and ten monitoring tools while we cut MTTR and stand up Kubernetes.",
      experience: [
        { ico:"MCG", role:"Director, Site Reliability Engineering", co:"Meridian Capital Group", dur:"5 yrs" },
        { ico:"PLT", role:"Staff Platform Engineer", co:"(prior fintech)", dur:"4 yrs" },
      ],
      posts: [
        { when:"POSTED &middot; 5 DAYS AGO", body:"&ldquo;Running ten monitoring tools isn&rsquo;t a strategy, it&rsquo;s a tax. Splunk here, Instana there, a dozen dashboards &mdash; and the March deploy still slipped through. My team pays that tax every night. If your &lsquo;platform&rsquo; adds an eleventh tool, we&rsquo;re not talking.&rdquo;", react:"<b>760</b> reactions &middot; <b>88</b> comments" },
        { when:"COMMENTED &middot; 2 WEEKS AGO", body:"On a thread about core migrations: &lsquo;The migration is the easy part. The hard part is doing it while you&rsquo;re also under an OCC exam. Nobody hands you a maintenance window in banking.&rsquo;", react:"<b>230</b> reactions" },
        { when:"POSTED &middot; 1 MONTH AGO", body:"We&rsquo;re hiring SREs and an Observability Engineer who&rsquo;s actually instrumented Kubernetes at scale (not on a slide). If that&rsquo;s you, my DMs are open.", react:"<b>300</b> reactions" },
      ],
      details: [
        { k:"Personal", v:"Cyclist &mdash; posts weekend rides around Charlotte (rapport, used carefully)." },
        { k:"Tell", v:"Allergic to 'AI-powered' hand-waving. Respects specifics: false-positive rates, trace coverage, failure modes." },
        { k:"Reads as", v:"Win him with a 'day in the life' of his team, not an outcomes pitch. He gates the technical yes to Rachel." },
      ],
      chips: ["SRE","Day-2 ops","MTTR","Kubernetes","Tool consolidation"],
    },
    priya: {
      name: "Priya Natarajan", initials:"PN", face:"face-priya.png",
      headline: "Manager, Observability & Monitoring Operations at Meridian Capital Group",
      meta: "Charlotte, NC &middot; 500+ connections &middot; <b>1 mutual</b>",
      about: "I keep the monitoring running &mdash; detection, dashboards, the Splunk and Instana stacks everyone leans on until something slips. I ran monitoring straight through the Heritage acquisition, so I can smell a pitch from a mile away. Tell me what your thing actually does on a Tuesday, not what it does in a keynote.",
      experience: [
        { ico:"MCG", role:"Manager, Observability & Monitoring Operations", co:"Meridian Capital Group", dur:"7 yrs" },
        { ico:"OPS", role:"Monitoring / NOC Lead", co:"(prior regional bank)", dur:"5 yrs" },
      ],
      posts: [
        { when:"POSTED &middot; 3 DAYS AGO", body:"&ldquo;Spent the weekend chasing false alerts again. When the one that mattered &mdash; the March deploy &mdash; didn&rsquo;t page anyone until customers were already locked out, that&rsquo;s the number that keeps me up. Two alerting models, two tools, no single source of truth. This is the unglamorous reality behind every &lsquo;resilience&rsquo; headline.&rdquo;", react:"<b>510</b> reactions &middot; <b>70</b> comments" },
        { when:"ASKED &middot; OBSERVABILITY COMMUNITY &middot; 3 WEEKS AGO", body:"Question for the group: what are people actually using to catch a bad deploy before customers do, across a mixed estate &mdash; legacy .NET/Java plus new Kubernetes? Our mean-time-to-detect on that March change was way too long. Real answers only.", react:"<b>150</b> reactions" },
        { when:"POSTED &middot; 6 WEEKS AGO", body:"Two tools, ten dashboards, a climbing Splunk bill. We don&rsquo;t need another dashboard. We need fewer things to babysit and faster detection.", react:"<b>280</b> reactions" },
      ],
      details: [
        { k:"Personal", v:"Film photography hobbyist &mdash; posts black-and-white street shots on weekends." },
        { k:"Tell", v:"Ex-operator. She'll test your technical claims immediately. Bring numbers, not adjectives." },
        { k:"Reads as", v:"Earn her with detection / alert-noise / ingest-cost specifics. She can champion a proof-of-value up to Daniel." },
      ],
      chips: ["Detection / MTTD","Alert noise","Log ingest cost","Trace coverage","Splunk + Instana"],
    },
  };

  const p = new URLSearchParams(location.search).get('p') || 'rachel';
  const d = PROFILES[p] || PROFILES.rachel;
  document.title = d.name + " &middot; LinkedIn";
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="in">in</span><span class="brand">LinkedIn</span><span class="tab">Profile</span></div>
    <div class="cover"></div>
    <div class="head">
      <div class="pfp"><img src="${d.face}" alt=""></div>
      <div class="nm">${d.name}</div>
      <div class="hl">${d.headline}</div>
      <div class="meta">${d.meta}</div>
      <div class="openrow"><span class="btn">Message</span><span class="btn ghost">Connect</span><span class="btn ghost">Follow</span></div>
    </div>
    <div class="wrap">
      <div class="card"><h2>About</h2><div class="about">${d.about}</div></div>
      <div class="card"><h2>Activity</h2>${d.posts.map(x=>`<div class="post"><div class="when">${x.when}</div><div class="body">${x.body}</div><div class="react">${x.react}</div></div>`).join('')}</div>
      <div class="card"><h2>Experience</h2>${d.experience.map(x=>`<div class="exp"><div class="ico">${x.ico}</div><div><div class="role">${x.role}</div><div class="co">${x.co}</div><div class="dur">${x.dur}</div></div></div>`).join('')}</div>
      <div class="card"><h2>Intel &mdash; read the room</h2>${d.details.map(x=>`<div class="det"><span class="k">${x.k}</span><span>${x.v}</span></div>`).join('')}</div>
      <div class="card"><h2>Topics they engage with</h2><div class="chips">${d.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div></div>
    </div>`;
</script>
</body>
</html>
